kind = "web"
previewPath = "/"
title = "OneTailor Toolkit"
version = "1.0.0"
id = "artifacts/one-tailor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25497

[services.development]
run = "pnpm --filter @workspace/one-tailor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/one-tailor", "run", "build" ]
publicDir = "artifacts/one-tailor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25497"
BASE_PATH = "/"
